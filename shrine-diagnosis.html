// ============================================================
// 状態
// ============================================================
let selectedBenefits = [];
let selectedPref = null;
let currentGogyo = null;
let currentJikkan = null;
let currentShrines = [];

// ============================================================
// 初期化
// ============================================================
function init() {
  // ご利益ボタン生成
  const grid = document.getElementById('benefitGrid');
  BENEFITS.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'benefit-btn';
    btn.id = 'benefit-' + b.id;
    btn.innerHTML = `<span class="benefit-icon">${b.icon}</span><span class="benefit-label">${b.label}</span><span class="benefit-desc">${b.desc}</span>`;
    btn.onclick = () => toggleBenefit(b.id);
    grid.appendChild(btn);
  });

  // 都道府県ボタン生成
  const prefGrid = document.getElementById('prefGrid');
  PREFECTURES.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'pref-btn';
    btn.id = 'pref-' + p.name;
    btn.textContent = p.name;
    btn.onclick = () => togglePref(p);
    prefGrid.appendChild(btn);
  });
}

// ============================================================
// ご利益トグル
// ============================================================
function toggleBenefit(id) {
  const idx = selectedBenefits.indexOf(id);
  if (idx === -1) selectedBenefits.push(id);
  else selectedBenefits.splice(idx, 1);
  document.getElementById('benefit-' + id).classList.toggle('active', selectedBenefits.includes(id));
  const badge = document.getElementById('benefitBadge');
  if (selectedBenefits.length > 0) {
    badge.style.display = 'block';
    badge.textContent = '選択中：' + selectedBenefits.map(i => BENEFITS.find(b=>b.id===i).label).join('・');
  } else {
    badge.style.display = 'none';
  }
}

// ============================================================
// 都道府県トグル
// ============================================================
function togglePref(p) {
  if (selectedPref && selectedPref.name === p.name) {
    selectedPref = null;
    document.getElementById('pref-' + p.name).classList.remove('active');
    document.getElementById('prefBadge').style.display = 'none';
  } else {
    if (selectedPref) document.getElementById('pref-' + selectedPref.name).classList.remove('active');
    selectedPref = p;
    document.getElementById('pref-' + p.name).classList.add('active');
    const badge = document.getElementById('prefBadge');
    badge.style.display = 'block';
    badge.textContent = '選択中：' + p.name;
  }
}

// ============================================================
// 画面遷移
// ============================================================
function goTo(step) {
  ['stepBenefit','stepPref','stepYear','stepResult'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('stepIndicator').style.display = 'flex';

  const stepMap = {benefit:0, pref:1, year:2, result:-1};
  const stepIdx = stepMap[step];
  ['dot0','dot1','dot2'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step-dot' + (i === stepIdx ? ' active' : i < stepIdx ? ' done' : '');
  });

  if (step === 'result') {
    document.getElementById('stepIndicator').style.display = 'none';
    document.getElementById('stepResult').style.display = 'block';
  } else {
    const idMap = {benefit:'stepBenefit', pref:'stepPref', year:'stepYear'};
    const el = document.getElementById(idMap[step]);
    el.style.display = 'block';
    el.classList.remove('fade-in');
    void el.offsetWidth;
    el.classList.add('fade-in');
  }

  // 生まれ年ページのサマリー更新
  if (step === 'year') {
    const parts = [];
    if (selectedBenefits.length > 0) parts.push(selectedBenefits.map(i=>BENEFITS.find(b=>b.id===i).icon).join('') + ' ' + selectedBenefits.map(i=>BENEFITS.find(b=>b.id===i).label).join('・'));
    if (selectedPref) parts.push('📍 ' + selectedPref.name + 'から近い順');
    document.getElementById('yearSummary').textContent = parts.join('　');
  }
}

// ============================================================
// 距離計算
// ============================================================
function calcDist(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// 診断
// ============================================================
function diagnose() {
  const y = parseInt(document.getElementById('yearInput').value);
  if (!y || isNaN(y) || y < 1900 || y > 2100) {
    document.getElementById('yearError').style.display = 'block';
    return;
  }

  currentJikkan = JIKKAN[y % 10];
  currentGogyo = currentJikkan.gogyo;
  const meta = GOGYO_META[currentGogyo];

  // 神社絞り込み・ソート
  let all = SHRINE_DB[currentGogyo];
  let filtered = selectedBenefits.length === 0 ? [...all] : all.filter(s => selectedBenefits.some(b => s.tags.includes(b)));
  if (filtered.length === 0) filtered = [...all];
  if (selectedPref) {
    filtered.sort((a,b) => calcDist(selectedPref.lat,selectedPref.lon,a.lat,a.lon) - calcDist(selectedPref.lat,selectedPref.lon,b.lat,b.lon));
  } else {
    filtered = shuffle(filtered);
  }
  currentShrines = filtered.slice(0, 6);

  // 背景色変更
  document.body.style.background = meta.bg;

  // 結果ヘッダー
  document.getElementById('resultEmoji').textContent = meta.emoji;
  document.getElementById('resultBirthLabel').textContent = `${y}年生まれ · ${currentJikkan.name}（${currentJikkan.yomi}）`;
  document.getElementById('resultKanji').textContent = currentGogyo;
  document.getElementById('resultKanji').style.color = meta.accent;
  document.getElementById('resultKanji').style.textShadow = `0 0 50px ${meta.glow}, 0 0 100px ${meta.glow}`;
  document.getElementById('resultYomi').textContent = meta.yomi + 'の気';
  document.getElementById('resultKeywords').innerHTML = meta.keywords.map(k=>`<span class="tag">${k}</span>`).join('');
  document.getElementById('resultDesc').textContent = meta.description;

  const filterParts = [];
  if (selectedBenefits.length > 0) filterParts.push('絞り込み：' + selectedBenefits.map(i=>BENEFITS.find(b=>b.id===i).label).join('・'));
  if (selectedPref) filterParts.push('📍 ' + selectedPref.name + 'から近い順');
  document.getElementById('resultFilterInfo').textContent = filterParts.join('　');

  // 神社リスト
  document.getElementById('shrineListTitle').innerHTML =
    `${meta.emoji} ${currentGogyo}属性 · おすすめ神社 ${currentShrines.length}社` +
    (selectedPref ? `<span style="margin-left:.8rem;color:rgba(255,255,255,.18)">（${selectedPref.name}から近い順）</span>` : '');

  const list = document.getElementById('shrineList');
  list.innerHTML = '';
  currentShrines.forEach((shrine, idx) => {
    const dist = selectedPref ? calcDist(selectedPref.lat, selectedPref.lon, shrine.lat, shrine.lon) : null;
    const distLabel = dist !== null ? (dist < 100 ? `約${Math.round(dist)}km` : `約${Math.round(dist/10)*10}km`) : '';
    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shrine.name+' '+shrine.prefecture+shrine.city)}`;
    const tagsHtml = shrine.tags.map(t => `<span class="tag${selectedBenefits.includes(t)?' match':''}">${t}</span>`).join('');

    list.innerHTML += `
      <div class="shrine-card">
        <div class="shrine-card-top">
          <div style="flex:1">
            <div class="shrine-name-row">
              ${selectedPref ? `<span class="rank-num">${idx+1}</span>` : ''}
              <span class="shrine-name">${shrine.name}</span>
            </div>
            <div class="shrine-location-row">
              <span class="shrine-location">📍 ${shrine.prefecture} ${shrine.city}</span>
              ${distLabel ? `<span class="dist-badge">(${distLabel})</span>` : ''}
              <a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" class="map-btn">地図 →</a>
            </div>
          </div>
          <div class="shrine-card-right">
            <div class="shrine-deity" style="color:${meta.accent};opacity:.85">${shrine.deity}</div>
            <div>${shrine.benefit}</div>
          </div>
        </div>
        <div class="shrine-tags">${tagsHtml}</div>
        <div class="reason-badge">⚡ ${shrine.reason}</div>
        <p class="shrine-vibe">${shrine.vibe}</p>
      </div>`;
  });

  goTo('result');
}

// ============================================================
// リセット
// ============================================================
function resetAll() {
  selectedBenefits = [];
  selectedPref = null;
  currentGogyo = null;
  currentJikkan = null;
  currentShrines = [];
  document.getElementById('yearInput').value = '';
  document.getElementById('yearError').style.display = 'none';
  document.querySelectorAll('.benefit-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.pref-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('benefitBadge').style.display = 'none';
  document.getElementById('prefBadge').style.display = 'none';
  document.body.style.background = 'linear-gradient(160deg,#06060e 0%,#0e0c18 100%)';
  goTo('benefit');
}

init();
</script>
</body>
</html>
